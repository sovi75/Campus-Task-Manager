<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Mode — Campus Task Manager</title>
  <meta name="description" content="Focus on your campus tasks using the Pomodoro timer, ambient sounds, and distraction-free workspace.">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    /* Styling Pomodoro & Focus mode page */
    .study-container {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: var(--sp-6);
      align-items: start;
    }

    .pomodoro-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--sp-8);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      text-align: center;
    }

    .timer-circle-wrap {
      position: relative;
      width: 240px;
      height: 240px;
      margin: var(--sp-6) 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .timer-svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .timer-circle-bg {
      fill: none;
      stroke: var(--bg-page);
      stroke-width: 8;
    }

    .timer-circle-progress {
      fill: none;
      stroke: var(--primary);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
    }

    .timer-time-display {
      position: absolute;
      font-size: 3.2rem;
      font-weight: 700;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    .timer-controls {
      display: flex;
      gap: var(--sp-3);
      margin-top: var(--sp-4);
    }

    .study-settings-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: var(--sp-6);
    }

    .mode-toggle-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--sp-2);
      margin-bottom: var(--sp-4);
    }

    .mode-btn {
      padding: 8px 12px;
      font-size: var(--text-xs);
      font-weight: 600;
      border: 1.5px solid var(--border);
      background: var(--bg-subtle);
      border-radius: var(--r-sm);
      cursor: pointer;
      color: var(--text-secondary);
      transition: var(--transition);
    }

    .mode-btn.active {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary-dark);
    }

    .mode-btn:hover:not(.active) {
      background: var(--border);
    }

    .focus-task-card {
      margin-top: var(--sp-4);
      padding: var(--sp-4);
      background: var(--bg-page);
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
      text-align: left;
    }

    .quote-box {
      margin-top: var(--sp-6);
      font-style: italic;
      color: var(--text-secondary);
      font-size: var(--text-sm);
      text-align: center;
      max-width: 460px;
    }

    .sound-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .sound-item:last-child {
      border-bottom: none;
    }

    .sound-play-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      color: var(--text-muted);
      transition: var(--transition);
    }

    .sound-play-toggle.playing {
      color: var(--color-success);
    }

    @media (max-width: 900px) {
      .study-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- ======== App Shell ======== -->
  <div class="app-shell">

    <!-- Sidebar (built by app.js) -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- Main Content -->
    <div class="main-content">

      <!-- Top Bar (built by app.js) -->
      <header class="topbar" id="topbar"></header>

      <!-- Page Content -->
      <main class="page-content">

        <div class="study-container">
          
          <!-- Timer Area -->
          <div class="pomodoro-card">
            
            <div class="mode-toggle-buttons" style="width: 100%; max-width: 380px;">
              <button class="mode-btn active" id="mode-focus" data-duration="25">Pomodoro Focus</button>
              <button class="mode-btn" id="mode-short" data-duration="5">Short Break</button>
              <button class="mode-btn" id="mode-long" data-duration="15">Long Break</button>
            </div>

            <div class="timer-circle-wrap">
              <svg class="timer-svg" viewBox="0 0 100 100">
                <circle class="timer-circle-bg" cx="50" cy="50" r="45"></circle>
                <circle class="timer-circle-progress" id="progress-bar" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="0"></circle>
              </svg>
              <div class="timer-time-display" id="time-display">25:00</div>
            </div>

            <div class="timer-controls">
              <button class="btn btn-primary" id="timer-start-btn" style="min-width: 100px;">Start Focus</button>
              <button class="btn btn-secondary" id="timer-reset-btn">Reset</button>
            </div>

            <div class="quote-box" id="quote-box">
              "Focus is a muscle, and you build it by using it."
            </div>

          </div>

          <!-- Configuration and Focus Settings Sidebar -->
          <div style="display: flex; flex-direction: column; gap: var(--sp-6);">
            
            <!-- Focus Task Selector -->
            <div class="study-settings-card">
              <h3 style="font-size: var(--text-md); font-weight: 700; margin-bottom: var(--sp-4);">🎯 Active Focus Task</h3>
              
              <div class="form-group">
                <label for="study-task-selector" class="form-label">Select Task to Work On</label>
                <select id="study-task-selector" class="form-input">
                  <option value="">-- General Study Focus --</option>
                </select>
              </div>

              <div class="focus-task-card" id="active-task-detail" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                  <span id="focus-task-title" style="font-weight: 600; font-size: var(--text-sm);">Select a task above</span>
                </div>
                <div style="display: flex; gap: var(--sp-1);">
                  <span class="chip" id="focus-task-priority">Priority</span>
                  <span class="chip" id="focus-task-category">Category</span>
                </div>
              </div>
            </div>

            <!-- Focus Ambient Audio Player -->
            <div class="study-settings-card">
              <h3 style="font-size: var(--text-md); font-weight: 700; margin-bottom: var(--sp-4);">🎧 Ambient Background Sound</h3>
              
              <div class="sound-item">
                <span style="font-size: var(--text-sm); font-weight: 500;">🌧️ Rainfall</span>
                <button class="sound-play-toggle" data-sound="rain">▶</button>
              </div>
              <div class="sound-item">
                <span style="font-size: var(--text-sm); font-weight: 500;">🎹 Lo-Fi Study Beats</span>
                <button class="sound-play-toggle" data-sound="lofi">▶</button>
              </div>
              <div class="sound-item">
                <span style="font-size: var(--text-sm); font-weight: 500;">☕ Cafe Ambience</span>
                <button class="sound-play-toggle" data-sound="cafe">▶</button>
              </div>
              <div class="sound-item">
                <span style="font-size: var(--text-sm); font-weight: 500;">🍃 White Noise</span>
                <button class="sound-play-toggle" data-sound="white">▶</button>
              </div>
            </div>

            <!-- Focus Statistics -->
            <div class="study-settings-card">
              <h3 style="font-size: var(--text-md); font-weight: 700; margin-bottom: var(--sp-3);">📊 Session Statistics</h3>
              <div style="display: flex; justify-content: space-between; font-size: var(--text-sm); margin-bottom: var(--sp-2);">
                <span style="color: var(--text-secondary);">Focus sessions completed:</span>
                <strong id="focus-session-count">0</strong>
              </div>
              <div style="display: flex; justify-content: space-between; font-size: var(--text-sm);">
                <span style="color: var(--text-secondary);">Total time focused:</span>
                <strong id="total-focus-time">0 mins</strong>
              </div>
            </div>

          </div>

        </div>

      </main>
    </div>
  </div>

  <!-- ======== Add / Edit Task Modal (Required by topbar) ======== -->
  <div class="modal-overlay hidden" id="task-modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Add New Task</h2>
        <button class="modal-close" id="modal-close-btn" aria-label="Close modal">✕</button>
      </div>
      <form id="task-form" novalidate autocomplete="off">
        <input type="hidden" id="modal-task-id" value="">
        <div class="modal-body">
          <div class="form-group">
            <label for="modal-title-input" class="form-label">Title <span class="required-star">*</span></label>
            <input type="text" id="modal-title-input" class="form-input" placeholder="e.g. Focus Task" required>
          </div>
          <div class="form-group">
            <label for="modal-due" class="form-label">Due Date <span class="required-star">*</span></label>
            <input type="date" id="modal-due" class="form-input" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="modal-cancel-btn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/reminders.js"></script>
  <script src="js/study.js"></script>
</body>
</html>
